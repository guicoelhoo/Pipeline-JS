name: CI - Development

on:
  push:
    branches: [ main ]

  pull_request:
    branches: [ main ]

jobs:


  security:
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@v2

      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
      
      - name: Instalar dependências
        run: npm install  

      - name: Verificar vulnerabilidade
        run: npm audit --audit-level=high

  quality:
    runs-on: ubuntu-latest
  
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
      
      - name: Instalar dependências
        run: npm install

      - name: Rodar lint
        run: npm run lint

      - name: Run Coverage
        run: npm run test

      - name: Análise com SonarCloud 
        uses: SonarSource/sonarcloud-github-action@v2 
        with: 
          args: > 
            -Dsonar.projectKey=edutbx_testepipeline-js
            -Dsonar.organization=edutbx
        env: 
          SONAR_TOKEN: ${{ 123 }}

 

  build:

    runs-on: ubuntu-latest
    needs: security

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Instalar dependências
        run: npm install

      - name: Gerar artefato
        run: zip -r app.zip .

      - name: Publicar artefato
        uses: actions/upload-artifact@v4
        with:
          name: app-build
          path: app.zip

  test:

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Baixar artefato
        uses: actions/download-artifact@v4
        with:
          name: app-build
          

      - name: Extrair artefato
        run: unzip app.zip

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Instalar dependências
        run: npm install

      - name: Rodar testes
        run: npm test



